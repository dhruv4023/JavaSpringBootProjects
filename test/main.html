</head>

<body>

<h2>Google Login Test</h2>

<div id="g_id_onload"
     data-client_id="645073303337-14f1hamk56jj8684sed078sb0ldgpjkt.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin" data-type="standard"></div>

<div id="result">Response will appear here...</div>

<script>
    function handleCredentialResponse(response) {
        console.log("Google ID Token:", response.credential);

        // Send ID token to backend
        fetch("http://localhost:8000/api/auth/google/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idToken: response.credential
            })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerText =
                JSON.stringify(data, null, 2);

            // Save JWT if needed
            if (data.token) {
                localStorage.setItem("jwt", data.token);
            }
        })
        .catch(err => {
            document.getElementById("result").innerText = err;
        });
    }
</script>

</body>
